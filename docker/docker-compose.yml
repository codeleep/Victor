# Victor 编排文件 (开发与离线部署共用)
#
# 离线部署 (镜像已 docker load 载入, compose 不会重新构建):
#   先编辑同目录 .env 修改 DB_PASSWORD / JWT_SECRET, 然后
#   docker compose up -d
#
# 本地开发 (镜像尚未构建, 加 --build 触发从源码构建):
#   docker compose up -d --build
name: victor

services:
  victor-app:
    image: victor-app:latest
    container_name: victor-app
    build:
      context: ..
      dockerfile: docker/app/Dockerfile.runtime
    environment:
      DB_HOST: victor-postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-victor}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-victor-ai-default-jwt-secret-key-must-be-at-least-256-bits-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - victor-uploads:/root/victor/uploads
    depends_on:
      victor-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  victor-postgres:
    image: victor-db:latest
    container_name: victor-postgres
    build:
      context: ..
      dockerfile: docker/db/Dockerfile
    environment:
      POSTGRES_DB: ${DB_NAME:-victor}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - victor-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-victor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  victor-pgdata:
  victor-uploads: