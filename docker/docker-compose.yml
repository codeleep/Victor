# Victor 编排文件 (开发与离线部署共用)
#
# 架构:
#   victor-app    = victor-base 镜像 (JRE+nginx+第三方lib, 固定)
#                   项目 modules 与前端 dist 通过 bind mount 挂入, 不进镜像
#   victor-postgres = victor-db 镜像 (pgvector + 建表/初始数据)
#
# 镜像版本由 deploy 脚本从 app/backend/manifest.json 读取后注入环境变量:
#   VICTOR_BASE_VERSION  -> victor-base:<requiresBase>
#   VICTOR_APP_VERSION   -> victor-db:<appVersion>
#
# 离线部署 (镜像已 docker load 载入): 先编辑 .env, 再 deploy 脚本启动
# 本地开发全栈验证:
#   bash docker/base/package-app.sh dev dev docker   # 产物输出到 docker/app
#   docker compose up -d --build                      # 构建 base/db 镜像并挂载 docker/app
name: victor

services:
  victor-app:
    image: victor-base:${VICTOR_BASE_VERSION:-dev}
    container_name: victor-app
    build:
      context: ..
      dockerfile: docker/base/Dockerfile
      args:
        APP_VERSION: ${VICTOR_BASE_VERSION:-dev}
    environment:
      DB_HOST: victor-postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-victor}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-victor-ai-default-jwt-secret-key-must-be-at-least-256-bits-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # 前端静态资源 (挂载, 改前端只换这里)
      - ./app/frontend:/usr/share/nginx/html:ro
      # 后端业务模块 jar (挂载, 改业务只换这里)
      - ./app/backend/modules:/app/backend/modules:ro
      # 可选配置覆盖目录
      - ./app/backend/config:/app/backend/config:ro
      # 应用清单 (appVersion + requiresBase, 启动时校验)
      - ./app/backend/manifest.json:/app/backend/manifest.json:ro
      - victor-uploads:/root/victor/uploads
    depends_on:
      victor-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  victor-postgres:
    image: victor-db:${VICTOR_APP_VERSION:-dev}
    container_name: victor-postgres
    build:
      context: ..
      dockerfile: docker/db/Dockerfile
    environment:
      POSTGRES_DB: ${DB_NAME:-victor}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - victor-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-victor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  victor-pgdata:
  victor-uploads:
