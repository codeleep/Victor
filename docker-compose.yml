version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: victor-app
    ports:
      - 80:80
    environment:
      - DB_NAME=victor
      - DB_PASSWORD=postgres
      - JWT_SECRET=victor-ai-default-jwt-secret-key-must-be-at-least-256-bits-long
      - JWT_EXPIRATION=86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: victor-postgres
    environment:
      POSTGRES_DB: victor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - victor-pgdata:/var/lib/postgresql/data
      - ./backend/victor-web/src/main/resources/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres -d victor]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  victor-pgdata:
