name: Build & Bundle

# 触发方式: 在 GitHub 网页创建并发布 Release 时触发
#   1. 网页 Releases -> Draft a new release
#   2. 选择 tag (需为三段式版本号 v1.0.0 或 v1.0.0-dev)
#   3. 发布 Release -> 自动触发本 workflow 构建镜像并打包
#   4. 构建产物自动上传回该 Release 的 Assets
#   - v1.0.0     正式版: 构建产物挂到 Release
#   - v1.0.0-dev 预发布: 产物留在 Actions (不挂 Release)
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_dev: ${{ steps.ver.outputs.is_dev }}
      upload_url: ${{ steps.ver.outputs.upload_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算并校验三段式版本号
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从 release 事件获取 tag 名
          TAG="${{ github.event.release.tag_name }}"
          v="${TAG#v}"   # 去掉 v 前缀

          # 校验三段式 x.y.z 或 x.y.z-dev
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-dev(\.[0-9]+)?)?$'; then
            echo "::error::版本号必须是三段式 x.y.z 或 x.y.z-dev, 当前 tag: $TAG"
            exit 1
          fi

          # dev 尾缀判定
          if echo "$v" | grep -qE -- '-dev'; then
            is_dev="true"
          else
            is_dev="false"
          fi

          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "is_dev=${is_dev}" >> "$GITHUB_OUTPUT"
          echo "upload_url=${{ github.event.release.upload_url }}" >> "$GITHUB_OUTPUT"
          echo "本次构建版本: ${v} (dev=${is_dev})"

      - name: 安装 QEMU (arm64 跨平台构建)
        if: matrix.platform == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: 安装 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建应用镜像 (版本号 + latest, 注入 APP_VERSION)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          platforms: linux/${{ matrix.platform }}
          tags: |
            victor-app:${{ steps.ver.outputs.version }}
            victor-app:latest
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          load: true
          cache-from: type=gha,scope=app-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=app-${{ matrix.platform }}

      - name: 构建数据库镜像 (版本号 + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/db/Dockerfile
          platforms: linux/${{ matrix.platform }}
          tags: |
            victor-db:${{ steps.ver.outputs.version }}
            victor-db:latest
          load: true
          cache-from: type=gha,scope=db-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=db-${{ matrix.platform }}

      - name: 组装离线分发包
        run: |
          set -e
          PLATFORM="${{ matrix.platform }}"
          VERSION="${{ steps.ver.outputs.version }}"
          ROOT="bundle/victor"
          mkdir -p "$ROOT/images"

          docker save \
            victor-app:${VERSION} victor-app:latest \
            victor-db:${VERSION} victor-db:latest \
            -o "$ROOT/images/victor-images.tar"

          cp docker/docker-compose.yml "$ROOT/docker-compose.yml"
          cp docker/deploy.sh        "$ROOT/deploy.sh"
          cp docker/deploy.bat       "$ROOT/deploy.bat"
          cp docker/.env.template    "$ROOT/.env"
          cp docker/DEPLOY.md        "$ROOT/README.md"
          chmod +x "$ROOT/deploy.sh"

          if [ "$PLATFORM" = "amd64" ]; then ARCH="x86_64"; else ARCH="arm64"; fi
          (cd bundle && zip -r "victor-${VERSION}-${ARCH}.zip" victor)

      - name: 上传构件 (供 release job 汇总)
        uses: actions/upload-artifact@v4
        with:
          name: victor-bundle-${{ matrix.platform }}
          path: bundle/*.zip
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    # 仅正式版 (非 dev) 才把产物挂到 Release
    if: needs.build.outputs.is_dev != 'true'
    steps:
      - name: 下载构件
        uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true

      - name: 上传产物到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: bundles/*.zip