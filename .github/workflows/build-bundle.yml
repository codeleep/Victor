name: Build & Bundle

# 触发: 在 GitHub 发布 Release (tag 为三段式 vX.Y.Z 或 vX.Y.Z-dev) 时
#   - v1.0.0     正式版: 产物挂到 Release
#   - v1.0.0-dev 预发布: 产物留在 Actions
#
# 流程:
#   build-app      构建 lib(第三方依赖) -> 与基准清单 diff -> 决定是否重建 base
#                  构建 app 包(前端 dist + modules + manifest) 并上传
#                  依赖变化时最后更新 docker/base/base-manifest.json 并提交回 main
#   build-images   按架构(amd64/arm64) 构建 victor-base(仅依赖变化时) + victor-db
#   assemble       组装离线分发包(每架构一个 zip)
#   release        正式版产物挂到 Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      verify_version:
        description: '验收用版本号 (仅 workflow_dispatch 生效, 默认 0.0.0-verify)'
        required: false
        default: '0.0.1-dev'

permissions:
  contents: write

jobs:
  build-app:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_dev: ${{ steps.ver.outputs.is_dev }}
      changed: ${{ steps.diff.outputs.changed }}
      new_base_version: ${{ steps.resolve.outputs.new_base_version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 计算并校验三段式版本号
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            # workflow_dispatch 手动触发: 用输入版本号, 跳过 tag 校验
            v="${{ github.event.inputs.verify_version }}"
            if [ -z "$v" ]; then v="0.0.1-dev"; fi
          else
            v="${TAG#v}"
          fi
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-dev(\.[0-9]+)?)?$'; then
            echo "::error::版本号必须是三段式 x.y.z 或 x.y.z-dev, 当前 tag: $TAG"
            exit 1
          fi
          if echo "$v" | grep -qE -- '-dev'; then is_dev=true; else is_dev=false; fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "is_dev=${is_dev}" >> "$GITHUB_OUTPUT"
          echo "本次构建版本: ${v} (dev=${is_dev})"

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 提取第三方 lib (用于依赖 diff)
        run: |
          mkdir -p build/lib
          (cd backend && mvn -pl victor-web -am clean install -DskipTests -B -q)
          (cd backend && mvn -pl victor-web dependency:copy-dependencies \
            -DincludeScope=runtime -DexcludeGroupIds=me.codeleep \
            -DoutputDirectory="$GITHUB_WORKSPACE/build/lib" -B -q)

      - name: 与基准清单比对依赖
        id: diff
        run: |
          python3 docker/base/manifest.py diff docker/base/base-manifest.json build/lib > /tmp/diff.json
          cat /tmp/diff.json
          changed=$(python3 -c "import json;print(json.load(open('/tmp/diff.json'))['changed'])")
          base_ver=$(python3 -c "import json;print(json.load(open('/tmp/diff.json'))['baselineVersion'])")
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "baseline_version=${base_ver}" >> "$GITHUB_OUTPUT"

      - name: 解析 newBaseVersion (变化则用 app 版本, 否则复用基准)
        id: resolve
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "True" ]; then
            echo "new_base_version=${{ steps.ver.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "new_base_version=${{ steps.diff.outputs.baseline_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 构建 app 包 (前端 + modules + manifest)
        run: |
          bash docker/base/package-app.sh "${{ steps.ver.outputs.version }}" "${{ steps.resolve.outputs.new_base_version }}" build
          echo "---- manifest ----"; cat build/app/backend/manifest.json

      - name: 上传 app 包构件
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app

      - name: 上传 lib 构件 (供 base 镜像构建)
        uses: actions/upload-artifact@v4
        with:
          name: lib-bundle
          path: build/lib

      - name: 依赖变化 -> 更新基准清单并提交回 main
        if: steps.diff.outputs.changed == 'True' && github.event_name == 'release'
        run: |
          python3 docker/base/manifest.py make build/lib "${{ steps.ver.outputs.version }}" > docker/base/base-manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add docker/base/base-manifest.json
          git commit -m "chore(base): publish base manifest v${{ steps.ver.outputs.version }} (deps changed)" || exit 0
          git push origin main

  build-images:
    needs: build-app
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 QEMU (arm64 跨平台)
        if: matrix.platform == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: 安装 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 下载 lib 构件
        uses: actions/download-artifact@v4
        with:
          name: lib-bundle
          path: build/lib

      - name: 准备变量
        id: vars
        run: |
          if [ "${{ matrix.platform }}" = "amd64" ]; then echo "arch=x86_64" >> "$GITHUB_OUTPUT"; else echo "arch=arm64" >> "$GITHUB_OUTPUT"; fi

      - name: 构建 base 镜像 (仅依赖变化时)
        if: needs.build-app.outputs.changed == 'True'
        run: |
          VER="${{ needs.build-app.outputs.version }}"
          mkdir -p ctx
          cp -r build/lib ctx/lib
          cp docker/base/nginx.conf docker/base/entrypoint.sh ctx/
          docker buildx build --platform linux/${{ matrix.platform }} \
            -f docker/base/Dockerfile.runtime \
            --build-arg APP_VERSION="${VER}" \
            -t victor-base:${VER} --load ctx/
          mkdir -p images
          docker save victor-base:${VER} -o images/victor-base-${VER}-${{ steps.vars.outputs.arch }}.tar

      - name: 构建 db 镜像
        run: |
          VER="${{ needs.build-app.outputs.version }}"
          docker buildx build --platform linux/${{ matrix.platform }} \
            -f docker/db/Dockerfile -t victor-db:${VER} --load .
          mkdir -p images
          docker save victor-db:${VER} -o images/victor-db-${VER}-${{ steps.vars.outputs.arch }}.tar

      - name: 上传镜像构件
        uses: actions/upload-artifact@v4
        with:
          name: images-${{ matrix.platform }}
          path: images/*.tar

  assemble:
    needs: [build-app, build-images]
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 app 包
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: staging/app

      - name: 下载 amd64 镜像
        uses: actions/download-artifact@v4
        with:
          name: images-amd64
          path: staging/images-amd64

      - name: 下载 arm64 镜像
        uses: actions/download-artifact@v4
        with:
          name: images-arm64
          path: staging/images-arm64

      - name: 组装离线分发包 (app 包 + base 包分离)
        env:
          CHANGED: ${{ needs.build-app.outputs.changed }}
        run: |
          set -e
          VER="${{ needs.build-app.outputs.version }}"

          # 公共文件 (compose / 脚本 / 文档)
          copy_common() {
            local root="$1"
            cp docker/docker-compose.yml "$root/docker-compose.yml"
            cp docker/deploy.sh          "$root/deploy.sh"
            cp docker/deploy.bat         "$root/deploy.bat"
            cp docker/db/upgrade-db.sh   "$root/upgrade-db.sh"
            cp docker/db/upgrade-db.bat  "$root/upgrade-db.bat"
            cp docker/.env.template      "$root/.env"
            cp docker/DEPLOY.md          "$root/README.md"
            chmod +x "$root/deploy.sh" "$root/upgrade-db.sh"
          }

          for arch in x86_64 arm64; do
            imgdir="staging/images-$([ "$arch" = x86_64 ] && echo amd64 || echo arm64)"

            # ---- app 包: 每次发版都出, 含 app 目录 + db 镜像 (体积小) ----
            APPROOT="bundle/victor-app"
            rm -rf "$APPROOT"
            mkdir -p "$APPROOT/images"
            cp -r staging/app "$APPROOT/app"
            cp "$imgdir"/victor-db-*.tar "$APPROOT/images/" 2>/dev/null || true
            copy_common "$APPROOT"
            (cd bundle && zip -r "victor-app-${VER}-${arch}.zip" victor-app)

            # ---- base 包: 仅依赖变化时才出, 含 base 镜像 (体积大) ----
            if [ "$CHANGED" = "True" ]; then
              BASEROOT="bundle/victor-base"
              rm -rf "$BASEROOT"
              mkdir -p "$BASEROOT/images"
              cp "$imgdir"/victor-base-*.tar "$BASEROOT/images/" 2>/dev/null || true
              printf '# 基础镜像包 v%s\n# 解压后执行: docker load -i images/victor-base-*.tar\n# 该 base 镜像供 victor-app:%s 复用\n' "$VER" "$VER" > "$BASEROOT/README.md"
              (cd bundle && zip -r "victor-base-${VER}-${arch}.zip" victor-base)
              rm -rf "$BASEROOT"
            fi
            rm -rf "$APPROOT"
          done

      - name: 上传分发包构件
        uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: bundle/*.zip
          retention-days: 14

  release:
    needs: assemble
    runs-on: ubuntu-latest
    if: needs.build-app.outputs.is_dev != 'true' && github.event_name == 'release'
    steps:
      - name: 下载分发包
        uses: actions/download-artifact@v4
        with:
          name: bundles
          path: bundles

      - name: 上传产物到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-app.outputs.version }}
          files: bundles/*.zip
