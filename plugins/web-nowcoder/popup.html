<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牛客题库导入 Victor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 450px; padding: 16px; font-family: -apple-system, system-ui, sans-serif; background: #fff; }
    .title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; }
    .section { margin-bottom: 12px; }
    .label { font-size: 13px; color: #666; margin-bottom: 4px; display: block; }
    .input, .textarea { width: 100%; padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px; }
    .textarea { min-height: 100px; resize: vertical; font-family: monospace; font-size: 12px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-danger { background: #ef4444; color: #fff; margin-top: 8px; }
    .btn-danger:hover { background: #dc2626; }
    .status { margin-top: 12px; padding: 10px; background: #f9fafb; border-radius: 6px; font-size: 13px; color: #374151; line-height: 1.5; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .checkbox-wrap { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .checkbox-wrap label { font-size: 13px; color: #666; cursor: pointer; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 4px; line-height: 1.4; }
    .hint code { background: #f3f4f6; padding: 1px 4px; border-radius: 3px; font-family: monospace; }
  </style>
</head>
<body>
  <div class="title">牛客题库导入 Victor</div>

  <div class="section">
    <label class="label" for="victorBaseUrl">Victor 后端地址</label>
    <input type="text" id="victorBaseUrl" value="http://localhost:8080">
  </div>

  <div class="section">
    <label class="label" for="victorApiKey">Victor API Key</label>
    <input type="text" id="victorApiKey" placeholder="在 Victor 系统中创建的 API Key">
  </div>

  <div class="section">
    <label class="label">粘贴题目数据 JSON</label>
    <textarea id="questionData" placeholder="请在牛客页面按 F12 控制台输入 JSON.stringify(window.__INITIAL_STATE__)，然后把结果粘贴到这里"></textarea>
    <div class="hint">
      1. 在牛客面试题页面按 F12 打开控制台<br>
      2. 输入 <code>copy(JSON.stringify(window.__INITIAL_STATE__))</code> 回车<br>
      3. 数据已自动复制到剪贴板，直接粘贴到上面的框里
    </div>
  </div>

  <div class="checkbox-wrap">
    <input type="checkbox" id="includeSource" checked>
    <label for="includeSource">题目描述中包含来源信息</label>
  </div>

  <button id="startBtn" class="btn btn-primary">开始导入</button>
  <button id="stopBtn" class="btn btn-danger" disabled>停止</button>

  <div id="status" class="status">等待开始...</div>

  <script src="popup.js"></script>
</body>
</html>
