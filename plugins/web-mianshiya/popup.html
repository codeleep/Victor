<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>web-mianshiya</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>web-mianshiya</h1>
    <p class="hint">在面试鸭题库页面打开插件，例如 <code>/bank/1787463103423897602</code>。</p>

    <label>
      Victor API 地址
      <input id="victorBaseUrl" placeholder="http://localhost:5173" />
    </label>

    <label>
      Victor Token
      <input id="victorToken" type="password" placeholder="登录 Victor 后从 localStorage 复制 token" />
    </label>

    <label>
      题库 ID
      <input id="bankId" placeholder="自动从当前 URL 识别" />
    </label>

    <div class="row">
      <label>
        每页数量
        <input id="pageSize" type="number" min="1" max="100" />
      </label>
      <label>
        最大页数
        <input id="maxPages" type="number" min="1" max="500" />
      </label>
    </div>

    <label class="check">
      <input id="includeAnswers" type="checkbox" />
      拉取推荐答案并写入参考答案
    </label>

    <button id="start">开始抓取并上传</button>
    <button id="stop" class="secondary">停止</button>
    <pre id="status">准备就绪</pre>
  </main>
  <script src="popup.js"></script>
</body>
</html>
